name: lahematix
type: generic
docroot: ""
webserver_type: generic
xdebug_enabled: false
database:
    type: postgres
    version: "16"
nodejs_version: "22"
use_dns_when_possible: true

# Next.js dev server runs as a background daemon inside the web container.
web_extra_daemons:
    - name: nextjs
      command: "npm run dev -- -H 0.0.0.0"
      directory: /var/www/html

# Expose the Next.js dev server (container port 3000) through the DDEV router.
# App will be reachable at https://lahematix.ddev.site:3000
web_extra_exposed_ports:
    - name: nextjs
      container_port: 3000
      http_port: 3001
      https_port: 3000

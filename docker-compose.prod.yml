# Production stack for Hetzner (Docker Compose).
# Reads secrets from ./.env on the server (see deploy/.env.production.example).
#
#   db      – PostgreSQL 16, data on a named volume, NOT exposed to the host
#   migrate – one-shot: applies Prisma migrations (profile "tools", never auto-starts)
#   app     – Next.js standalone server (built from ./Dockerfile), internal only
#   caddy   – reverse proxy on :80/:443 with automatic Let's Encrypt HTTPS
#
# Deploy with: bash deploy/deploy.sh

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    profiles: ['tools']
    build:
      context: .
      target: builder # this stage has the full node_modules + prisma CLI
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: npx prisma migrate deploy
    restart: 'no'

  app:
    build:
      context: .
    env_file: .env
    environment:
      HOSTNAME: 0.0.0.0 # make the standalone server listen on all interfaces
      PORT: '3000'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - '3000' # internal only — reached via caddy, not published to host
    volumes:
      - uploads:/app/uploads

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    volumes:
      # Mount the directory (not the single file) so that a `git reset` — which
      # replaces the Caddyfile with a new inode — is actually seen by the
      # container. A single-file bind mount would pin the old inode.
      - ./deploy:/etc/caddy:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  uploads:
  caddy_data:
  caddy_config:
